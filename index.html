<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WB Stat Live</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0; padding: 16px;
            display: flex; flex-direction: column; align-items: center;
        }
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #f1f1f1);
            border-radius: 15px; padding: 20px; width: 100%;
            box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h2 { margin: 0 0 10px 0; color: var(--tg-theme-button-color, #248bed); font-size: 18px; }
        .stat-row {
            display: flex; justify-content: space-between;
            margin: 12px 0; padding-bottom: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .value { font-weight: bold; font-size: 16px; }
        .hint { font-size: 12px; color: var(--tg-theme-hint-color, #999); text-align: center; }
        button {
            background-color: var(--tg-theme-button-color, #248bed);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 10px; padding: 15px;
            width: 100%; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        #loader { display: none; margin-top: 10px; font-size: 14px; color: #f39c12; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="user-greeting">Загрузка...</h2>
    
    <div class="main-stat">
        <p class="hint">СЕГОДНЯ</p>
        <div class="stat-row">
            <span class="value" id="orders-today">0 шт.</span>
            <span class="value" id="rev-today">0 ₽</span>
        </div>
    </div>

    <hr style="opacity: 0.1; margin: 15px 0;">

    <div class="secondary-stat">
        <p class="hint">ВЧЕРА</p>
        <div class="stat-row" style="opacity: 0.8; font-size: 14px;">
            <span id="orders-yesterday">0 шт.</span>
            <span id="rev-yesterday">0 ₽</span>
        </div>
    </div>
    <div id="loader">🔄 Синхронизация...</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const API_URL = "https://wb-backend-r049.onrender.com/stats";

    tg.ready();
    tg.expand();

    async function loadStats() {
        document.getElementById('loader').style.display = "block";
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            if (data.status === "success") {
                // Сегодня
                document.getElementById('orders-today').innerText = `${data.today.orders} шт.`;
                document.getElementById('rev-today').innerText = `${data.today.revenue.toLocaleString()} ₽`;
                
                // Вчера
                document.getElementById('orders-yesterday').innerText = `${data.yesterday.orders} шт.`;
                document.getElementById('rev-yesterday').innerText = `${data.yesterday.revenue.toLocaleString()} ₽`;
            }
        } catch (e) {
            console.error(e);
        } finally {
            document.getElementById('loader').style.display = "none";
        }
    }

    loadStats();
    // Обновление по кнопке (если она есть) или через MainButton
    tg.MainButton.setText("ОБНОВИТЬ").show().onClick(loadStats);
</script>

    <button id="refresh-btn">Обновить данные</button>

    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = "https://wb-backend-r049.onrender.com/stats";

        tg.ready();
        tg.expand();

        // Отображаем имя пользователя
        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-greeting').innerText = `Привет, ${tg.initDataUnsafe.user.first_name}! 👋`;
        }

        async function loadStats() {
            const loader = document.getElementById('loader');
            loader.style.display = "block";
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.status === "success") {
                    document.getElementById('orders-count').innerText = `${data.orders} шт.`;
                    document.getElementById('revenue-count').innerText = `${data.revenue.toLocaleString()} ₽`;
                } else {
                    alert("Ошибка API: " + data.message);
                }
            } catch (error) {
                console.error("Ошибка запроса:", error);
                // Если сервер на Render "спит", это уведомление поможет понять причину задержки
                tg.showScanQrPopup({ text: "Просыпаюсь... Подождите 30 сек." });
                setTimeout(() => tg.closeScanQrPopup(), 3000);
            } finally {
                loader.style.display = "none";
            }
        }

        // Загрузить при старте
        loadStats();

        // Кнопка обновления
        document.getElementById('refresh-btn').addEventListener('click', () => {
            tg.HapticFeedback.impactOccurred('light');
            loadStats();
        });

        // Главная кнопка закрытия
        tg.MainButton.text = "ЗАКРЫТЬ";
        tg.MainButton.show();
        tg.MainButton.onClick(() => tg.close());
    </script>
</body>
</html>
